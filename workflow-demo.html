<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Automatisation IA — Lead Automation | Studio Auralis</title>
  <meta name="description" content="Un lead arrive, il est qualifié et envoyé au bon commercial en 30 secondes. Démo interactive du workflow lead automation par Studio Auralis.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@300;400;500&family=Outfit:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <style>
    /* ── Page-specific overrides ── */
    body { cursor: none; }

    .subpage-hero {
      padding: 120px 0 32px;
      text-align: center;
      position: relative;
      z-index: 2;
    }
    .subpage-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-80);
      margin-bottom: 20px;
      transition: color .3s;
    }
    .subpage-back:hover { color: var(--gold); }
    .subpage-title {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: clamp(2.5rem, 5vw, 4rem);
      color: var(--text-100);
      letter-spacing: -.03em;
      margin-bottom: 16px;
    }
    .subpage-subtitle {
      font-size: 17px;
      color: var(--text-60);
      font-weight: 300;
      max-width: 600px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ── Sections ── */
    .demo-section {
      position: relative;
      z-index: 2;
      padding: 0 0 80px;
    }
    .demo-container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px;
    }
    .demo-label {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 16px;
    }
    .demo-heading {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: clamp(1.5rem, 3vw, 2rem);
      color: var(--text-100);
      letter-spacing: -.02em;
      margin-bottom: 12px;
    }
    .demo-desc {
      font-size: 15px;
      color: var(--text-60);
      max-width: 560px;
      line-height: 1.7;
      margin-bottom: 24px;
    }

    /* ── Section 1: Workflow SVG ── */
    .wf-layout {
      display: flex;
      gap: 0;
      background: var(--noir-card);
      border: 1px solid var(--noir-border);
      border-radius: 10px;
      overflow: hidden;
      min-height: 400px;
    }
    .wf-canvas {
      flex: 1;
      position: relative;
      background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(0,229,204,.03) 0%, transparent 70%);
      overflow-x: auto;
    }
    .wf-dots {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: .08;
    }
    .wf-canvas svg.wf-svg {
      width: 100%;
      min-width: 660px;
      display: block;
      padding: 20px 16px;
    }

    .wf-panel {
      width: 0;
      min-width: 0;
      background: var(--noir-card);
      border-left: 1px solid var(--noir-border);
      transition: width .3s var(--ease-out), min-width .3s var(--ease-out);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .wf-panel.open {
      width: 360px;
      min-width: 360px;
    }
    .wf-panel-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--noir-border);
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .wf-panel-icon {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .wf-panel-close {
      cursor: pointer;
      width: 30px;
      height: 30px;
      border-radius: 6px;
      background: var(--noir-hover);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-60);
      font-size: 16px;
      border: 1px solid var(--noir-border);
      transition: color .2s;
    }
    .wf-panel-close:hover { color: var(--text-100); }
    .wf-panel-body {
      flex: 1;
      overflow: auto;
      padding: 20px;
    }
    .wf-panel-section-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-40);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 10px;
    }
    .wf-panel-text {
      font-size: 13.5px;
      color: var(--text-60);
      line-height: 1.75;
      margin-bottom: 22px;
    }
    .wf-benefit {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }
    .wf-benefit-check {
      width: 20px;
      height: 20px;
      border-radius: 5px;
      flex-shrink: 0;
      margin-top: 1px;
      background: var(--gold-bg);
      border: 1px solid var(--gold-border);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .wf-benefit span {
      font-size: 13px;
      color: var(--text-60);
      line-height: 1.55;
    }
    .wf-panel-tech {
      padding: 12px 14px;
      border-radius: 7px;
      background: var(--noir);
      border: 1px solid var(--noir-border);
      font-size: 11.5px;
      color: var(--text-40);
      font-family: var(--font-mono);
      line-height: 1.6;
    }
    .wf-panel-footer {
      padding: 14px 20px;
      border-top: 1px solid var(--noir-border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .wf-panel-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 6px rgba(0,229,204,.4);
    }
    .wf-panel-footer span {
      font-size: 11px;
      color: var(--text-40);
    }

    /* ── Section 2: Dashboard ── */
    .dash-grid {
      display: grid;
      gap: 8px;
    }
    .dash-stats {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr;
      gap: 8px;
    }
    .dash-card {
      background: var(--noir-card);
      border: 1px solid var(--noir-border);
      border-radius: 10px;
    }
    .dash-stat {
      padding: 14px 18px;
    }
    .dash-stat-featured {
      border-left: 2px solid var(--gold);
    }
    .dash-stat-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-40);
      font-weight: 600;
      margin-bottom: 6px;
    }
    .dash-stat-num {
      font-family: var(--font-display);
      font-size: 42px;
      font-weight: 900;
      letter-spacing: -2.5px;
      line-height: 1;
      color: var(--text-100);
    }
    .dash-stat-delta {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      color: var(--gold);
      margin-top: 6px;
    }
    .dash-stat-sm .dash-stat-num {
      font-size: 28px;
      letter-spacing: -1.2px;
    }
    .dash-stat-sm .dash-stat-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }
    .dash-stat-sm .dash-stat-delta {
      margin-top: 0;
    }
    .dash-stat-delta.warn { color: #e8a84c; }
    .dash-bar {
      height: 3px;
      background: var(--noir-border);
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }
    .dash-bar-fill {
      height: 100%;
      border-radius: 2px;
    }
    .dash-bar-fill.fill-accent { background: var(--gold); }
    .dash-bar-fill.fill-warm { background: #e8a84c; }

    /* Dashboard bar chart fill anim */
    .dash-bar-fill.anim-active { animation: dashFillIn 1.2s ease both; }
    @keyframes dashFillIn { from { width: 0 !important; } }

    /* Feed */
    .dash-bottom {
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 8px;
    }
    .dash-feed-head {
      padding: 10px 16px;
      border-bottom: 1px solid var(--noir-border);
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1.4px;
      color: var(--text-40);
    }
    .f-row {
      display: grid;
      grid-template-columns: 26px 1fr auto auto;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-bottom: 1px solid rgba(42,49,64,.4);
    }
    .f-row:last-child { border-bottom: none; }
    .f-row.anim-active { animation: fRowIn 6s ease-in-out infinite; }
    .f-row.anim-active:nth-child(1) { animation-delay: .4s; }
    .f-row.anim-active:nth-child(2) { animation-delay: 1.8s; }
    .f-row.anim-active:nth-child(3) { animation-delay: 3.2s; }
    .f-row.anim-active:nth-child(4) { animation-delay: 4.6s; }
    @keyframes fRowIn {
      0% { opacity: 0; transform: translateY(4px); }
      6% { opacity: 1; transform: translateY(0); }
      68% { opacity: 1; }
      100% { opacity: .15; }
    }
    .f-av {
      width: 26px;
      height: 26px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 700;
      color: var(--noir);
    }
    .f-text {
      font-size: 12px;
      color: var(--text-60);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .f-text b { color: var(--text-100); font-weight: 600; }
    .f-tag {
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 500;
      padding: 2px 5px;
      border-radius: 3px;
      text-transform: uppercase;
    }
    .tag-score { background: var(--gold-bg); color: var(--gold-dim); }
    .tag-email { background: rgba(90,99,114,.1); color: var(--text-60); }
    .tag-new { background: rgba(232,168,76,.07); color: #e8a84c; }
    .tag-done { background: var(--gold-bg); color: var(--gold); }
    .f-time {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-40);
      text-align: right;
      min-width: 18px;
    }

    /* Chart */
    .dash-chart {
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
    }
    .ch-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 4px;
    }
    .ch-title {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1.4px;
      color: var(--text-40);
    }
    .ch-pct {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--gold-dim);
    }
    .ch-big {
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -1.5px;
      color: var(--text-100);
      line-height: 1;
      margin-bottom: 10px;
    }
    .ch-big span {
      font-size: 16px;
      font-weight: 500;
      color: var(--text-40);
      letter-spacing: 0;
    }
    .ch-bars {
      flex: 1;
      display: flex;
      align-items: flex-end;
      gap: 5px;
      min-height: 60px;
    }
    .b-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .b-bar {
      width: 100%;
      border-radius: 3px;
      background: var(--noir-border);
      min-height: 3px;
    }
    .b-bar.anim-active { animation: bBarGrow .7s ease both; }
    .b-col:nth-child(1) .b-bar.anim-active { animation-delay: .8s; }
    .b-col:nth-child(2) .b-bar.anim-active { animation-delay: .9s; }
    .b-col:nth-child(3) .b-bar.anim-active { animation-delay: 1.0s; }
    .b-col:nth-child(4) .b-bar.anim-active { animation-delay: 1.1s; }
    .b-col:nth-child(5) .b-bar.anim-active { animation-delay: 1.2s; }
    .b-col:nth-child(6) .b-bar.anim-active { animation-delay: 1.3s; }
    .b-col:nth-child(7) .b-bar.anim-active { animation-delay: 1.4s; }
    @keyframes bBarGrow { from { height: 0 !important; opacity: 0; } to { opacity: 1; } }
    .b-bar.today {
      background: var(--gold);
      box-shadow: 0 0 10px rgba(0,229,204,.15);
    }
    .b-day {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text-40);
      font-weight: 500;
    }
    .b-col:nth-child(4) .b-day { color: var(--gold-dim); }

    /* ── Section 3: ROI Calculator ── */
    .calc-card {
      background: var(--noir-card);
      border: 1px solid var(--noir-border);
      border-radius: 10px;
      overflow: hidden;
    }
    .calc-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--noir-border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .calc-header-title {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 700;
      color: var(--text-100);
    }
    .calc-badge {
      font-family: var(--font-mono);
      font-size: 10px;
      padding: 3px 10px;
      border-radius: 4px;
      background: var(--gold-bg);
      color: var(--gold);
      font-weight: 500;
      border: 1px solid var(--gold-border);
    }
    .calc-body {
      padding: 20px;
    }
    .calc-sliders {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 24px;
    }
    .calc-slider-head {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .calc-slider-label {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-40);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .calc-slider-value {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 800;
      color: var(--gold);
    }
    .calc-slider-range {
      display: flex;
      justify-content: space-between;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-40);
      margin-top: 3px;
    }

    /* Slider styles */
    input[type="range"].sl {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      background: var(--noir-border);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type="range"].sl::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--gold);
      border: 2px solid var(--noir-card);
      cursor: pointer;
      box-shadow: 0 0 8px rgba(0,229,204,.35);
    }
    input[type="range"].sl::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--gold);
      border: 2px solid var(--noir-card);
      cursor: pointer;
      box-shadow: 0 0 8px rgba(0,229,204,.35);
    }

    /* KPI cards */
    .calc-kpis {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }
    .calc-kpi {
      background: var(--gold-bg);
      border: 1px solid var(--gold-border);
      border-radius: 8px;
      padding: 16px 10px;
      text-align: center;
    }
    .calc-kpi-value {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 800;
      color: var(--gold);
    }
    .calc-kpi-value span {
      font-size: 13px;
      margin-left: 2px;
    }
    .calc-kpi-label {
      font-family: var(--font-mono);
      font-size: 9.5px;
      color: var(--text-40);
      margin-top: 5px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .3px;
    }

    /* Time saved bar */
    .calc-timebar {
      padding: 16px 18px;
      background: var(--noir);
      border-radius: 8px;
      border: 1px solid var(--noir-border);
      margin-bottom: 24px;
    }
    .calc-timebar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .calc-timebar-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .calc-timebar-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-60);
    }
    .calc-timebar-pct {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 800;
      color: var(--gold);
    }
    .calc-progress {
      width: 100%;
      height: 8px;
      background: var(--noir-hover);
      border-radius: 4px;
      overflow: hidden;
    }
    .calc-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--gold-bright));
      border-radius: 4px;
      transition: width .4s ease;
    }
    .calc-timebar-foot {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
    }
    .calc-timebar-foot span {
      font-size: 10.5px;
      color: var(--text-40);
    }
    .calc-timebar-foot .hl-gold { color: var(--gold); font-weight: 700; }
    .calc-timebar-foot .hl-bright { color: var(--gold-bright); font-weight: 700; }

    /* Comparison grid */
    .calc-compare {
      display: grid;
      grid-template-columns: 1fr 56px 1fr;
      background: var(--noir);
      border-radius: 8px;
      border: 1px solid var(--noir-border);
      overflow: hidden;
    }
    .calc-compare-col {
      padding: 22px 20px;
    }
    .calc-compare-tag {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 12px;
    }
    .calc-compare-tag span {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .calc-compare-tag.manual span { color: #ff6b6b; }
    .calc-compare-tag.auto span { color: var(--gold); }
    .calc-compare-big {
      font-family: var(--font-display);
      font-size: 34px;
      font-weight: 800;
      margin-bottom: 14px;
    }
    .calc-compare-big.manual { color: #ff6b6b; }
    .calc-compare-big.auto { color: var(--gold); }
    .calc-compare-big .unit {
      font-size: 14px;
      font-weight: 400;
      color: var(--text-40);
    }
    .calc-compare-list {
      font-size: 12px;
      color: var(--text-40);
      line-height: 2;
    }
    .calc-compare-arrow {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-left: 1px solid var(--noir-border);
      border-right: 1px solid var(--noir-border);
    }
    .calc-compare-arrow-circle {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--gold-bg);
      border: 1px solid var(--gold-border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--gold);
      font-size: 15px;
      font-weight: 700;
    }
    .calc-compare-speed {
      margin-top: 6px;
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 800;
      color: var(--gold);
    }

    /* Manual minutes input */
    .calc-manual-input {
      width: 56px;
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: 800;
      color: #ff6b6b;
      background: var(--noir-hover);
      border: 1px solid var(--noir-border);
      border-radius: 6px;
      padding: 2px 6px;
      outline: none;
      text-align: center;
    }
    .calc-manual-input:focus {
      border-color: var(--gold-border);
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; }

    /* ── CTA Section ── */
    .cta-section {
      position: relative;
      z-index: 2;
      padding: 60px 0 100px;
      text-align: center;
    }
    .cta-box {
      max-width: 600px;
      margin: 0 auto;
      padding: 48px 32px;
      background: var(--noir-card);
      border: 1px solid var(--noir-border);
      border-radius: 12px;
      position: relative;
      overflow: hidden;
    }
    .cta-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .cta-title {

const COL_X = [40, 210, 390, 560, 730];

  crm:      { col: 0, row: 1 },
  enrich:   { col: 1, row: 1 },
  ai:       { col: 0, row: 2, span: true },
  router:   { col: 0, row: 3, span: true },
  hot:      { col: 0, row: 4 },
  nurture:  { col: 1, row: 4 },
};

function ctr(n, mob) {
  if (mob) {
    const m = MOB_POS[n.id];
    const x = m.span ? (MOB_COL[0] + MOB_COL[1]) / 2 : MOB_COL[m.col];
    return { x: x + MOB_NW / 2, y: MOB_ROW[m.row] + MOB_NH / 2 };
  }
  return { x: COL_X[n.col] + NW / 2, y: ROW_Y[n.row] + NH / 2 };
}
function bz(f, t, mob) {
  const a = ctr(f, mob), b = ctr(t, mob);
  if (mob) {
    const dy = Math.abs(b.y - a.y) * 0.4;
    return `M${a.x},${a.y} C${a.x},${a.y + dy} ${b.x},${b.y - dy} ${b.x},${b.y}`;
  }
  const dx = Math.abs(b.x - a.x) * 0.5;
  return `M${a.x},${a.y} C${a.x + dx},${a.y} ${b.x - dx},${b.y} ${b.x},${b.y}`;
}

function useIsMobile(bp = 768) {
  const [mob, setMob] = useState(window.innerWidth <= bp);
  useEffect(() => {
    const fn = () => setMob(window.innerWidth <= bp);
    window.addEventListener('resize', fn);
    return () => window.removeEventListener('resize', fn);
  }, [bp]);
  return mob;
}

/* ── useIntersection hook ── */
function useInView(opts = {}) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    if (!ref.current) return;
    const io = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { setVisible(true); io.disconnect(); }
    }, { threshold: opts.threshold || 0.2 });
    io.observe(ref.current);
    return () => io.disconnect();
  }, []);
  return [ref, visible];
}

function CalculatorBlock() {
  const [lpm, setLpm] = useState(150);
  const [cph, setCph] = useState(35);
  const [manualMin, setManualMin] = useState(30);

  const autoSec = 30;
  const sH = (lpm * manualMin) / 60 - (lpm * autoSec) / 3600;
  const sHY = sH * 12;
  const sM = sH * cph;
  const sY = sHY * cph;
  const spd = manualMin > 0 ? Math.round((manualMin * 60) / autoSec) : 0;
  const fmt = n => Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ");
  const pctTimeSaved = lpm > 0 && manualMin > 0 ? Math.min(99, Math.round(((manualMin * 60 - autoSec) / (manualMin * 60)) * 100)) : 0;

  return (
    <div className="calc-card">
      <div className="calc-header">
        <span className="calc-header-title">Combien vous gagneriez ?</span>
        <span className="calc-badge">TESTEZ</span>
      </div>
      <div className="calc-body">
        <div className="calc-sliders">
          <div>
            <div className="calc-slider-head">
              <span className="calc-slider-label">Vos leads / mois</span>
              <span className="calc-slider-value">{fmt(lpm)}</span>
            </div>
            <input type="range" className="sl" min={0} max={500} step={5} value={lpm} onChange={e => setLpm(+e.target.value)}/>
            <div className="calc-slider-range"><span>0</span><span>500</span></div>
          </div>
          <div>
            <div className="calc-slider-head">
              <span className="calc-slider-label">Taux horaire</span>
              <span className="calc-slider-value">{cph} €</span>
            </div>
            <input type="range" className="sl" min={8} max={120} step={1} value={cph} onChange={e => setCph(+e.target.value)}/>
            <div className="calc-slider-range"><span>8 €</span><span>120 €</span></div>
          </div>
        </div>
        <div className="calc-kpis">
          {[
            { l: "Heures gagnées / mois", v: fmt(sH), u: "h" },
            { l: "Heures gagnées / an", v: fmt(sHY), u: "h" },
            { l: "Économisé / mois", v: fmt(sM), u: "€" },
            { l: "Économisé / an", v: fmt(sY), u: "€" },
          ].map(k => (
            <div key={k.l} className="calc-kpi">
              <div className="calc-kpi-value">{k.v}<span>{k.u}</span></div>
              <div className="calc-kpi-label">{k.l}</div>
            </div>
          ))}
        </div>
        <div className="calc-timebar">
          <div className="calc-timebar-head">
            <div className="calc-timebar-left">
              {I.trending(ACCENT)}
              <span className="calc-timebar-label">Ce temps part dans la vente</span>
            </div>
            <span className="calc-timebar-pct">{pctTimeSaved}%</span>
          </div>
          <div className="calc-progress">
            <div className="calc-progress-fill" style={{ width: pctTimeSaved + "%" }}/>
          </div>
          <div className="calc-timebar-foot">
            <span>Vos commerciaux récupèrent <span className="hl-gold">{fmt(sH)}h/mois</span> pour vendre</span>
            <span>soit <span className="hl-bright">{fmt(sY)}€</span> / an</span>
          </div>
        </div>
        <div className="calc-compare">
          <div className="calc-compare-col">
            <div className="calc-compare-tag manual">
              {I.clock("#ff6b6b")}
              <span>À la main</span>
            </div>
            <div className="calc-compare-big manual" style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
              <input type="number" className="calc-manual-input" min={1} max={60} value={manualMin}
                onChange={e => setManualMin(Math.max(1, Math.min(60, +e.target.value || 1)))}/>
              <span className="unit">min / lead</span>
            </div>
            <div className="calc-compare-list">
              {DEFAULT_MANUAL_STEPS.map((s, i) => <div key={i}>{s.text}</div>)}
            </div>
          </div>
          <div className="calc-compare-arrow">
            <div className="calc-compare-arrow-circle">→</div>
            <div className="calc-compare-speed">×{spd}</div>
          </div>
          <div className="calc-compare-col">
            <div className="calc-compare-tag auto">
              {I.activity(ACCENT)}
              <span>Automatisé</span>
            </div>
            <div className="calc-compare-big auto">30 <span className="unit">sec / lead</span></div>
            <div className="calc-compare-list">
              Se lance tout seul<br/>
              Profil complété en 2 sec<br/>
              Score IA de 0 à 100<br/>
              Envoyé au bon endroit<br/>
              Notif au commercial direct
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

  </script>

  <!-- GSAP scroll animations -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      gsap.registerPlugin(ScrollTrigger);

      // Animate each demo-section on scroll
      document.querySelectorAll('.demo-section, .cta-section').forEach(function(sec) {
        gsap.from(sec, {
          scrollTrigger: { trigger: sec, start: 'top 85%', once: true },
          y: 40, opacity: 0, duration: 0.8, ease: 'power3.out'
        });
      });

      // Mobile burger menu
      var burger = document.getElementById('navBurger');
      var mobileMenu = document.getElementById('mobileMenu');
      if (burger && mobileMenu) {
        burger.addEventListener('click', function() {
          burger.classList.toggle('is-active');
          mobileMenu.classList.toggle('is-open');
          document.body.style.overflow = mobileMenu.classList.contains('is-open') ? 'hidden' : '';
        });
        mobileMenu.querySelectorAll('a').forEach(function(link) {
          link.addEventListener('click', function() {
            burger.classList.remove('is-active');
            mobileMenu.classList.remove('is-open');
            document.body.style.overflow = '';
          });
        });
      }
    });
  </script>

  <!-- Custom cursor -->
  <script>
    (function(){
      if(window.matchMedia('(hover:none)').matches)return;
      var dot=document.getElementById('cursorDot'),ring=document.getElementById('cursorRing');
      var mx=0,my=0,rx=0,ry=0,vis=false;
      document.addEventListener('mousemove',function(e){
        mx=e.clientX;my=e.clientY;
        dot.style.left=mx+'px';dot.style.top=my+'px';
        if(!vis){vis=true;dot.style.opacity='1';ring.style.opacity='.6';rx=mx;ry=my;}
      });
      (function loop(){rx+=(mx-rx)*.15;ry+=(my-ry)*.15;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(loop)})();
      document.querySelectorAll('a,button,[data-hover]').forEach(function(el){
        el.addEventListener('mouseenter',function(){dot.classList.add('is-hover');ring.classList.add('is-hover')});
        el.addEventListener('mouseleave',function(){dot.classList.remove('is-hover');ring.classList.remove('is-hover')});
      });
    })();
  </script>
